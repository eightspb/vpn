# Alembic configuration — migrations for VPN Postgres
# Run from project root: python -m alembic upgrade head

[alembic]
script_location = alembic
prepend_sys_path = .
# sqlalchemy.url задаётся в env.py из DATABASE_URL
# sqlalchemy.url = postgresql+psycopg2://vpn:secret@localhost:5432/vpn

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
