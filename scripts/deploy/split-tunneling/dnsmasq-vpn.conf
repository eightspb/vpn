# =============================================================================
# dnsmasq-vpn.conf — DNS-прокси на VPS1 для split tunneling
#
# Кладётся в /etc/dnsmasq.d/vpn.conf
# Развёрнут scripts/deploy/setup-split-tunneling.sh
#
# Слушает только на 10.9.0.1 (адрес VPS1 в сети awg1).
# Все DNS-запросы клиентов попадают сюда через nat PREROUTING DNAT.
# Запросы форвардятся в DNS upstream на VPS2 (10.8.0.2:53) через тоннель awg0.
# При ответе на запросы для российских TLD (.ru, .рф, .su) полученные IP
# автоматически добавляются в ipset ru_subnets — на их основе iptables/mangle
# маркирует пакеты для policy routing через основной интерфейс VPS1.
# =============================================================================

listen-address=10.9.0.1
bind-dynamic
no-resolv
no-hosts
no-poll
domain-needed
bogus-priv

# Upstream → VPS2 DNS (сейчас youtube-proxy, через тоннель awg0)
server=10.8.0.2

# Российские TLD: автоматически класть резолвленные IP в ipset
# .рф → Punycode xn--p1ai: dnsmasq 2.90 не парсит non-ASCII в именах доменов
ipset=/.ru/.xn--p1ai/.su/ru_subnets

cache-size=10000
neg-ttl=60
min-cache-ttl=60

# Стандартный лог
log-facility=/var/log/dnsmasq.log
