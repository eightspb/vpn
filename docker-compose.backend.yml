# docker-compose.backend.yml — локальный стек для нового FastAPI backend
# Не трогает существующие deploy-скрипты. Запуск: docker compose -f docker-compose.backend.yml up -d

version: "3.9"

networks:
  backend:
    driver: bridge

services:
  postgres:
    image: postgres:16-alpine
    networks:
      - backend
    environment:
      POSTGRES_USER: vpn
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: vpn
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpn -d vpn"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    networks:
      - backend
    user: "999:999"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    networks:
      - backend
    env_file:
      - .env
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://vpn:changeme@postgres:5432/vpn}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "127.0.0.1:8000:8000"
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  bot:
    build:
      context: .
      dockerfile: backend/Dockerfile
    networks:
      - backend
    env_file:
      - .env
    environment:
      APP_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://vpn:changeme@postgres:5432/vpn}
      REDIS_URL: redis://redis:6379/0
      BOT_SERVICE_HOST: 0.0.0.0
      BOT_SERVICE_PORT: 8010
    command: ["uvicorn", "backend.bot.main:app", "--host", "0.0.0.0", "--port", "8010"]
    ports:
      - "127.0.0.1:8010:8010"
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    networks:
      - backend
    env_file:
      - .env
    environment:
      APP_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://vpn:changeme@postgres:5432/vpn}
      REDIS_URL: redis://redis:6379/0
    command: ["python", "-m", "backend.workers.main"]
    security_opt:
      - no-new-privileges:true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
