# docker-compose.backend.yml — локальный стек для нового FastAPI backend
# Не трогает существующие deploy-скрипты. Запуск: docker compose -f docker-compose.backend.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_USER: vpn
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: vpn
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpn -d vpn"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis:
    image: redis:7-alpine
    security_opt:
      - no-new-privileges:true
    user: "999:999"
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: postgresql+psycopg2://vpn:secret@postgres:5432/vpn
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

  bot:
    build:
      context: .
      dockerfile: backend/Dockerfile
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg2://vpn:secret@postgres:5432/vpn
      REDIS_URL: redis://redis:6379/0
      BOT_SERVICE_HOST: 0.0.0.0
      BOT_SERVICE_PORT: 8010
    command: ["uvicorn", "backend.bot.main:app", "--host", "0.0.0.0", "--port", "8010"]
    ports:
      - "8010:8010"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg2://vpn:secret@postgres:5432/vpn
      REDIS_URL: redis://redis:6379/0
    command: ["python", "-m", "backend.workers.main"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

networks:
  backend:
    driver: bridge
